<div class="flex max-h-full flex-col gap-4 overflow-auto p-4">
  <h1 class="text-2xl font-bold text-gray-700">Selecciona un tipo</h1>
  @for (type of types(); track type.name) {
    <app-type-card [type]="type" (click)="onSelectedType(type)" />
  } @empty {
    <h2 class="text-center text-2xl text-shadow-gray-500">No hay tipos que mostrar</h2>
  }
</div>
