<div class="flex max-h-full flex-col gap-4 overflow-auto p-4">
  <h1 class="text-2xl font-bold text-gray-700">Selecciona un pokemon</h1>
  @for (pokemon of pokemonList(); track pokemon.name) {
    <app-pokemon-card [pokemon]="pokemon" (click)="onSelectedPokemon(pokemon)"></app-pokemon-card>
  } @empty {
    <h2 class="text-center text-2xl text-shadow-gray-500">Selecciona un TIIIIIPO</h2>
  }
</div>
